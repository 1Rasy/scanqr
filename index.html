<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>二维码电子化助手</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:-apple-system,sans-serif;background:#f5f5f7;padding:20px}
.box{max-width:600px;margin:auto;background:#fff;padding:16px;border-radius:12px}
button{width:100%;padding:14px;margin:8px 0;border:none;border-radius:8px}
#reader{display:none}
</style>
</head>
<body>
<div class="box">
<h2>二维码电子化助手</h2>
<button id="start">开启扫码</button>
<button id="stop" style="display:none">关闭扫码</button>
<div id="reader"></div>
<div>已扫描 <span id="count">0</span> 条</div>
<ul id="list"></ul>
<button id="upload" disabled>上传到 Supabase</button>
</div>

<script>
const SUPABASE_URL='https://mcsxyghcyperkonmnthe.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_k_d8yMB3o4GxTce4oIyDxA_RTfCunjY';
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let scanner=null;
const data=[];
const set=new Set();

start.onclick=async()=>{
 try{
   reader.style.display='block';
   start.style.display='none';
   stop.style.display='block';

   scanner=new Html5Qrcode("reader");

   const cams=await Html5Qrcode.getCameras();

   if(!cams || !cams.length){
      alert("未找到摄像头");
      return;
   }

   const backCam=cams.find(c=>/back|rear|environment/i.test(c.label));
   const camId=(backCam||cams[0]).id;

   await scanner.start(
      camId,
      {fps:10,qrbox:{width:250,height:250}},
      txt=>{
        if(set.has(txt)) return;
        set.add(txt);

        data.push({content:txt,saved:false});

        if(navigator.vibrate) navigator.vibrate(100);

        render();
      }
   );

 }catch(e){
   console.error(e);
   alert("启动失败: "+e.message);
 }
};

stop.onclick=async()=>{
 try{
   if(scanner){
      await scanner.stop();
      await scanner.clear();
   }
 }catch(e){}

 reader.style.display='none';
 start.style.display='block';
 stop.style.display='none';
};

function render(){
 count.innerText=data.length;
 list.innerHTML='';

 data.forEach(x=>{
   const li=document.createElement('li');
   li.innerHTML=x.content+(x.saved?' ✅':'');
   list.appendChild(li);
 });

 upload.disabled=!data.some(x=>!x.saved);
}

upload.onclick=async()=>{
 const rows=data.filter(x=>!x.saved).map(x=>({content:x.content}));

 try{
   const {error}=await supabase.from('qr_codes').insert(rows);
   if(error) throw error;

   data.forEach(x=>x.saved=true);
   render();
   alert('上传成功');
 }catch(e){
   alert('上传失败: '+e.message);
 }
};
</script>
</body>
</html>

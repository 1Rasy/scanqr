<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码电子化助手</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 20px; background: #f5f5f7; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 扫描区域样式 */
        .scan-section { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        #reader { width: 100%; max-width: 400px; height: 300px; margin: 15px auto; background: #000; border-radius: 8px; overflow: hidden; display: none; }
        
        /* 按钮样式 */
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn-primary { background: #007aff; color: white; }
        .btn-primary:hover { background: #0063cc; }
        .btn-success { background: #34c759; color: white; }
        .btn-success:disabled { background: #d1d1d6; cursor: not-allowed; }
        .btn-danger { background: #ff3b30; color: white; }
        
        /* 暂存列表样式 */
        .list-section { margin-top: 20px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        ul { list-style: none; padding: 0; max-height: 250px; overflow-y: auto; margin: 10px 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; word-break: break-all; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .status { font-size: 12px; padding: 4px 8px; border-radius: 4px; background: #f1f1f1; }
        .status.saved { color: #fff; background: #34c759; }
    </style>
</head>
<body>

<div class="container">
    <h2>条码/二维码批量扫描器</h2>
    
    <div class="scan-section">
        <button id="start-btn" class="btn btn-primary" onclick="startScanning()">📷 开启相机扫码</button>
        <button id="stop-btn" class="btn btn-danger" onclick="stopScanning()" style="display: none;">🛑 关闭相机</button>
        
        <div id="reader"></div>
    </div>
    
    <div class="list-section">
        <h3>本次扫描暂存区 (<span id="count">0</span>)</h3>
        <ul id="qr-list">
            </ul>
        <button id="upload-btn" class="btn btn-success" onclick="saveAllToSupabase()" disabled>逐个保存到 Supabase</button>
    </div>
</div>

<script>

    // 2. 开启扫码按钮触发的函数
    function startScanning() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'block';

        // 创建专属的扫描实例
        html5QrCode = new Html5Qrcode("reader");
        
        // 启动摄像头（默认调用后置摄像头 'environment'）
        html5QrCode.start(
            { facingMode: "environment" }, 
            {
                fps: 10,    // 每秒帧数
                qrbox: { width: 250, height: 250 }  // 扫描框大小
            },
            onScanSuccess
        ).catch(err => {
            console.error("无法开启摄像头:", err);
            alert("摄像头开启失败，请检查权限或是否在 HTTPS 环境下运行。");
            stopScanning();
        });
    }

    // 关闭相机按钮触发的函数
    function stopScanning() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';
                document.getElementById('stop-btn').style.display = 'none';
            }).catch(err => console.error("停止相机失败:", err));
        }
    }

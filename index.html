<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码电子化助手</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:-apple-system,sans-serif;margin:20px;background:#f5f5f7;color:#333}
.container{max-width:600px;margin:auto}
.card{background:#fff;padding:16px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.05);margin-bottom:16px}
#reader{display:none}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:bold;margin-top:10px;cursor:pointer}
.primary{background:#007aff;color:#fff}
.danger{background:#ff3b30;color:#fff}
.success{background:#34c759;color:#fff}
.btn:disabled{background:#ccc}
ul{list-style:none;padding:0;margin:0;max-height:400px;overflow:auto}
li{padding:10px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;gap:10px}
.saved{color:#34c759}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h2>二维码电子化助手</h2>
<button id="startBtn" class="btn primary">📷 开启扫码</button>
<button id="stopBtn" class="btn danger" style="display:none">🛑 关闭相机</button>
<div id="reader"></div>
</div>

<div class="card">
<h3>已扫描 <span id="count">0</span> 条</h3>
<ul id="list"></ul>
<button id="uploadBtn" class="btn success" disabled>☁️ 上传到 Supabase</button>
</div>
</div>

<script>
const SUPABASE_URL='https://mcsxyghcyperkonmnthe.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_k_d8yMB3o4GxTce4oIyDxA_RTfCunjY';

const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let html5QrCode=null;
const scannedItems=[];
const scannedSet=new Set();

const countEl=document.getElementById('count');
const listEl=document.getElementById('list');
const uploadBtn=document.getElementById('uploadBtn');

document.getElementById('startBtn').onclick=startScanning;
document.getElementById('stopBtn').onclick=stopScanning;
uploadBtn.onclick=uploadAll;

async function startScanning(){
 document.getElementById('reader').style.display='block';
 document.getElementById('startBtn').style.display='none';
 document.getElementById('stopBtn').style.display='block';

 html5QrCode=new Html5Qrcode("reader");

 await html5QrCode.start(
  {facingMode:"environment"},
  {fps:5,qrbox:{width:280,height:280}},
  onScanSuccess
 ).catch(err=>{
   alert("相机启动失败");
   console.error(err);
 });
}

async function stopScanning(){
 if(!html5QrCode) return;
 try{
   await html5QrCode.stop();
   await html5QrCode.clear();
 }catch(e){}
 document.getElementById('reader').style.display='none';
 document.getElementById('startBtn').style.display='block';
 document.getElementById('stopBtn').style.display='none';
}

function onScanSuccess(text){
 if(scannedSet.has(text)) return;

 scannedSet.add(text);

 if(navigator.vibrate) navigator.vibrate(100);

 scannedItems.push({
   content:text,
   status:'pending'
 });

 render();
}

function render(){
 countEl.innerText=scannedItems.length;
 listEl.innerHTML='';

 scannedItems.forEach(item=>{
   const li=document.createElement('li');
   li.innerHTML=`
    <span style="word-break:break-all">${item.content}</span>
    <span class="${item.status==='saved'?'saved':''}">
      ${item.status==='saved'?'已保存':'待上传'}
    </span>
   `;
   listEl.appendChild(li);
 });

 uploadBtn.disabled=!scannedItems.some(x=>x.status==='pending');
}

async function uploadAll(){
 const rows=scannedItems
  .filter(x=>x.status==='pending')
  .map(x=>({content:x.content}));

 if(!rows.length) return;

 uploadBtn.disabled=true;
 uploadBtn.innerText='上传中...';

 try{
   const {error}=await supabase
    .from('qr_codes')
    .insert(rows);

   if(error) throw error;

   scannedItems.forEach(x=>{
     if(x.status==='pending') x.status='saved';
   });

   render();
   alert('上传成功');
 }catch(err){
   alert('上传失败：'+err.message);
 }

 uploadBtn.innerText='☁️ 上传到 Supabase';
}
</script>
</body>
</html>
